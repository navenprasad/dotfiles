# Kanagawa Dragon theme 
# Jetpack preset

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
continuation_prompt = "[β•Ηβ•Ι ](dimmed white)"

format = """($nix_shell$container$fill$git_metrics\n)$cmd_duration\
$hostname\
$localip\
$shlvl\
$shell\
$env_var\
$jobs\
$sudo\
$username\
$character"""

right_format = """
$singularity\
$kubernetes\
$directory\
$vcsh\
$fossil_branch\
$git_branch\
$git_commit\
$git_state\
$git_status\
$hg_branch\
$pijul_channel\
$docker_context\
$package\
$golang\
$nodejs\
$python\
$ruby\
$rust\
$elixir\
$conda\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$status\
$os\
$battery\
$time"""

[fill]
symbol = ' '

# Kanagawa Wave core colors
# bg:      sumiInk1     #1F1F28
# fg:      fujiWhite    #DCD7BA
# accent:  crystalBlue  #7E9CD8, springGreen #98BB6C, waveRed #E46876, surimiOrange #FFA066, carpYellow #E6C384 [web:535]

[character]
format = "$symbol "
success_symbol = "[>](bold fg:#E6C384)"      # carpYellow
error_symbol   = "[>](bold fg:#E46876)"      # waveRed
vimcmd_symbol  = "[<](bold fg:#98BB6C)"      # springGreen
vimcmd_replace_one_symbol = "β½¨"
vimcmd_replace_symbol     = "β•Γ"
vimcmd_visual_symbol      = "β•Φ"

[env_var.VIMSHELL]
format = "[$env_value]($style)"
style = "fg:#7AA89F italic"                 # waveAqua2

[sudo]
format = "[$symbol]($style)"
style = "bold fg:#957FB8"                   # oniViolet
symbol = "β΄àβîà"
disabled = false

[username]
style_user = "bold fg:#E6C384"
style_root = "bold fg:#E82424"              # samuraiRed
format = "[β≠‰ $user]($style) "
disabled = false
show_always = false

[directory]
home_symbol = "β¨²"
truncation_length = 2
truncation_symbol = "β•Γ "
read_only = " β½à"
use_os_path_sep = true
style = "italic fg:#7E9CD8"                 # crystalBlue
read_only_style = "fg:#FF9E3B"              # roninYellow
format = "[$path]($style)[$read_only]($read_only_style)"
repo_root_style = "bold fg:#7E9CD8"
before_repo_root_style = "fg:#727169"       # fujiGray
repo_root_format = "[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) [β•≥](bold fg:#7E9CD8)"

[cmd_duration]
format = "[β½³ $duration ](italic fg:#C8C093)" # oldWhite

[jobs]
format = "[$symbol$number]($style) "
style = "fg:#C8C093"
symbol = "[β•Ε](fg:#7E9CD8 italic)"

[localip]
ssh_only = true
format = " β½·[$localipv4](bold fg:#9CABCA)"   # springViolet2
disabled = false

[time]
disabled = false
format = "[ $time]($style)"
time_format = "%R"
utc_time_offset = "local"
style = "italic fg:#C8C093"

[battery]
format = "[ $percentage $symbol]($style)"
full_symbol = "β•à"
charging_symbol = "[βÜë](italic bold fg:#98BB6C)"
discharging_symbol = "βÜ™"
unknown_symbol = "β•ë"
empty_symbol = "β•É"

[[battery.display]]
threshold = 20
style = "italic bold fg:#E82424"

[[battery.display]]
threshold = 60
style = "italic fg:#FF9E3B"

[[battery.display]]
threshold = 70
style = "italic fg:#E6C384"

[git_branch]
format = " [$branch(:$remote_branch)]($style)"
symbol = "[β•≥](bold fg:#7E9CD8)"
style = "italic fg:#7E9CD8"
truncation_symbol = "β΄·"
truncation_length = 11
ignore_branches = ["main", "master"]
only_attached = true

[git_metrics]
format = "([β•¥$added]($added_style))([β•Ω$deleted]($deleted_style))"
added_style = "italic fg:#76946A"           # autumnGreen
deleted_style = "italic fg:#C34043"         # autumnRed
ignore_submodules = true
disabled = false

[git_status]
style = "bold fg:#7E9CD8"
format = "([βéΣ$ahead_behind$staged$modified$untracked$renamed$deleted$conflicted$stashedβéΞ]($style))"
conflicted = "[β½Σβ½Π](fg:#E46876)"
ahead      = "[β•¥βî²[${count}](fg:#DCD7BA bold)βî²](fg:#98BB6C)"
behind     = "[β•Ωβî²[${count}](fg:#DCD7BA bold)βî²](fg:#E46876)"
diverged   = "[β½΅ β•¥βîΛ[${ahead_count}](fg:#DCD7BA)βî²β•ΩβîΛ[${behind_count}](fg:#DCD7BA)βî²](fg:#957FB8)"
untracked  = "[β½¨β½Π](fg:#FF9E3B)"
stashed    = "[β½Éβ½à](fg:#C8C093)"
modified   = "[β½èβ½Π](fg:#DCA561)"             # autumnYellow
staged     = "[β•ΣβîΛ[$count](fg:#DCD7BA bold)βî²](fg:#7AA89F)"
renamed    = "[β½éβ½Π](fg:#7E9CD8)"
deleted    = "[β€ï](fg:#C34043)"

[deno]
format = " [deno](italic) [βàΪ $version](bold fg:#98BB6C)"
version_format = "${raw}"

[nodejs]
format = " [node](italic) [β½Ϊ ($version)](bold fg:#98BB6C)"
version_format = "${raw}"
detect_files = ["package-lock.json", "yarn.lock"]
detect_folders = ["node_modules"]
detect_extensions = []

[python]
format = " [py](italic) [${symbol}${version}]($style)"
symbol = "[β¨â](bold fg:#7E9CD8)β¨ä "
version_format = "${raw}"
style = "bold fg:#E6C384"

[ruby]
format = " [rb](italic) [${symbol}${version}]($style)"
symbol = "β½Ü "
version_format = "${raw}"
style = "bold fg:#E46876"

[rust]
format = " [rs](italic) [$symbol$version]($style)"
symbol = "βäÉ "
version_format = "${raw}"
style = "bold fg:#E46876"

[golang]
symbol = "βà© "
format = " go [$symbol($version )]($style)"
style = "bold fg:#7FB4CA"                   # springBlue
version_format = "${raw}"

[elixir]
symbol = "β•≥ "
format = " exs [$symbol $version OTP $otp_version ]($style)"
style = "bold fg:#957FB8"

[conda]
symbol = "β½· "
format = " conda [$symbol$environment]($style)"
style = "fg:#7AA89F"

[package]
format = " [pkg](italic) [$symbol$version]($style)"
version_format = "${raw}"
symbol = "β½® "
style = "italic fg:#FFA066"

[memory_usage]
symbol = "β•Σβ•Ϊβ•Σ "
format = " mem [${ram}( ${swap})]($style)"
style = "fg:#C8C093"

[nix_shell]
style = "bold italic fg:#7AA89F"
symbol = "β€Ε"
format = "[$symbol nixβéΣ$stateβéΣ]($style) [$name](italic fg:#C8C093)"
impure_msg = "[β¨Ϋ](bold fg:#E46876)"
pure_msg   = "[β¨Ψ](bold fg:#98BB6C)"
unknown_msg = "[β½¨](bold fg:#FF9E3B)"
